<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commander un site — Atelier Bleu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site">
  <nav class="nav">
    <a href="index.html" class="logo">ATELIER<span class="dot">.</span>BLEU</a>
    <div class="nav-links">
      <a href="index.html#tarifs">Tarifs</a>
      <a href="index.html#faq">Questions</a>
    </div>
    <a href="index.html" class="btn">← Retour</a>
  </nav>
</header>

<section style="padding-top:60px;">
  <div class="wrap" style="max-width: 720px;">
    <div class="eyebrow">Devis & commande</div>
    <h2 style="margin-bottom: 10px;">Décrivez votre projet.</h2>
    <p style="margin-bottom: 40px;">Ces informations nous permettent de préparer la structure de votre site avant la mise en production. Le paiement se fait à l'étape suivante.</p>

    <form id="order-form" class="form-card">

      <label for="forfait">Forfait</label>
      <select id="forfait" name="forfait" required>
        <option value="essentiel">Essentiel — 290 €</option>
        <option value="pro">Pro — 590 €</option>
        <option value="sur-mesure">Sur-mesure — à partir de 990 €</option>
      </select>

      <label for="nom">Nom et prénom</label>
      <input type="text" id="nom" name="nom" required>

      <label for="entreprise">Nom de l'activité / entreprise</label>
      <input type="text" id="entreprise" name="entreprise">

      <label for="email">Adresse e-mail</label>
      <input type="email" id="email" name="email" required>

      <label for="telephone">Téléphone</label>
      <input type="tel" id="telephone" name="telephone">

      <label for="secteur">Secteur d'activité</label>
      <input type="text" id="secteur" name="secteur" placeholder="Restauration, artisanat, commerce…">

      <label for="description">Décrivez votre projet</label>
      <textarea id="description" name="description" placeholder="Ce que doit contenir le site, le style souhaité, des exemples de sites que vous aimez…" required></textarea>

      <label for="contenu">Avez-vous déjà des textes, logo et photos prêts ?</label>
      <select id="contenu" name="contenu">
        <option value="oui">Oui, tout est prêt</option>
        <option value="partiel">Partiellement</option>
        <option value="non">Non, j'ai besoin d'aide</option>
      </select>

      <button type="submit" class="btn btn-signal" style="width:100%; justify-content:center; margin-top:10px;">
        Envoyer ma demande et passer au paiement →
      </button>

      <div id="status" class="form-status"></div>
    </form>
  </div>
</section>

<footer class="site">
  <div class="wrap footer-grid">
    <div class="mono">ATELIER.BLEU — Fort-de-France, Martinique</div>
    <div class="mono">contact@atelierbleu.fr</div>
  </div>
</footer>

<script src="js/main.js"></script>
</body>
</html>
